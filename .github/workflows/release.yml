name: Release New Version

# Bumps the version, regenerates the changelog, commits & pushes a vX.Y.Z tag.
# Pushing that tag triggers build-app.yml and build-ai-api.yml to build & deploy.
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Version bump (ignored if explicit_version is set)'
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      explicit_version:
        description: 'Explicit version X.Y.Z (overrides release_type)'
        type: string
        required: false
        default: ''

# Needed to push the release commit + tag back to the repo.
permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Bump, tag & push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history + tags so the changelog generator can diff versions.
          fetch-depth: 0
          # Use a token that can push to a protected default branch if needed.
          # Falls back to the default GITHUB_TOKEN when RELEASE_TOKEN is unset.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release script
        run: |
          INPUT="${{ github.event.inputs.explicit_version }}"
          if [ -z "$INPUT" ]; then
            INPUT="${{ github.event.inputs.release_type }}"
          fi
          echo "Releasing with input: $INPUT"
          node scripts/release.mjs "$INPUT"

      - name: Push commit and tag
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin --tags
