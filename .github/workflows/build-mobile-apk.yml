name: Build Mobile APK & Release

on:
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes'
        required: false
        default: 'New build'

  # Auto-trigger on mobile version tags (e.g. mobile-v1.0.0)
  push:
    tags:
      - 'mobile-v*'

permissions:
  contents: write

# Cancel an in-progress build if a newer one starts for the same ref
concurrency:
  group: build-mobile-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies & build cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          # android/ no existe en el checkout (lo genera prebuild), así que
          # hasheamos lo que SÍ define el grafo nativo: lockfile + config Expo.
          key: gradle-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/app.json', 'apps/mobile/package.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env file
        working-directory: apps/mobile
        run: |
          cat <<'DOTENV' > .env
          EXPO_PUBLIC_PB_URL=${{ vars.EXPO_PUBLIC_PB_URL }}
          EXPO_PUBLIC_AI_API_URL=${{ vars.EXPO_PUBLIC_AI_API_URL }}
          EXPO_PUBLIC_OPENPANEL_CLIENT_ID=${{ vars.EXPO_PUBLIC_OPENPANEL_CLIENT_ID }}
          EXPO_PUBLIC_OPENPANEL_CLIENT_SECRET=${{ secrets.EXPO_PUBLIC_OPENPANEL_CLIENT_SECRET }}
          EXPO_PUBLIC_SENTRY_DSN=${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          DOTENV

      - name: Create google-services.json
        # Android FCM config. Kept out of the repo (gitignored credential);
        # provided via the GOOGLE_SERVICES_JSON secret and written here so
        # `expo prebuild` (android.googleServicesFile) can copy it into the
        # native project. Set it with:
        #   gh secret set GOOGLE_SERVICES_JSON < apps/mobile/google-services.json
        working-directory: apps/mobile
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is not set. Run: gh secret set GOOGLE_SERVICES_JSON < apps/mobile/google-services.json"
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON" > google-services.json
          echo "Wrote google-services.json ($(wc -c < google-services.json) bytes)"

      - name: Generate Android native project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild --platform android --clean

      - name: Configure release signing
        # Stable release keystore so sideloaded updates install over a previous
        # version (Android keys app identity by package + signing cert). Runs
        # AFTER prebuild because --clean wipes android/. If the keystore secret
        # is absent we fall back to Expo's debug keystore (the build still works,
        # but each build is signed with a different throwaway key → users must
        # uninstall to update). Set the secrets to enable stable signing:
        #   keytool -genkeypair -v -keystore calistenia-release.jks -alias calistenia \
        #     -keyalg RSA -keysize 2048 -validity 10000 -storepass <PW> -keypass <PW> \
        #     -dname "CN=Calistenia, O=Guille, C=US"
        #   base64 -i calistenia-release.jks | gh secret set ANDROID_KEYSTORE_BASE64
        #   gh secret set ANDROID_KEYSTORE_PASSWORD --body <PW>
        #   gh secret set ANDROID_KEY_ALIAS --body calistenia
        #   gh secret set ANDROID_KEY_PASSWORD --body <PW>
        working-directory: apps/mobile/android/app
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 no está seteado — el APK se firmará con el debug keystore (regenerado cada build, los updates requerirán reinstalar). Setéalo para firma estable."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore
          echo "Wrote release.keystore ($(wc -c < release.keystore) bytes)"
          # Expo's build.gradle only defines a `debug` signingConfig and points
          # buildTypes.release at it. Inject a `release` config that reads creds
          # from env, and repoint the release buildType to it.
          node - <<'NODE'
          const fs = require('fs');
          const p = 'build.gradle';
          let s = fs.readFileSync(p, 'utf8');
          if (s.includes('signingConfigs.release')) { console.log('release signingConfig already present'); process.exit(0); }
          const block = [
          'signingConfigs {',
          '    release {',
          "        storeFile file('release.keystore')",
          "        storePassword System.getenv('ANDROID_KEYSTORE_PASSWORD')",
          "        keyAlias System.getenv('ANDROID_KEY_ALIAS')",
          "        keyPassword System.getenv('ANDROID_KEY_PASSWORD')",
          '    }',
          ].join('\n');
          s = s.replace(/signingConfigs\s*\{/, block);
          s = s.replace(/(release\s*\{[^}]*?signingConfig\s+)signingConfigs\.debug/s, '$1signingConfigs.release');
          fs.writeFileSync(p, s);
          console.log('Patched build.gradle with release signingConfig');
          NODE

      - name: Build APK
        working-directory: apps/mobile/android
        # Sentry source maps are uploaded during the release bundle task. The
        # org/project come from android/sentry.properties (written by the
        # @sentry/react-native expo plugin during prebuild) and the token from
        # SENTRY_AUTH_TOKEN below. @sentry/cli is a direct dep of apps/mobile so
        # its binary resolves cleanly under pnpm.
        #
        # reactNativeArchitectures restricts the native build to real phones
        # (arm64 + 32-bit arm), dropping x86/x86_64 emulator ABIs → ~half the
        # native compile (Hermes + New Arch codegen). The keystore creds are read
        # by the release signingConfig injected in the previous step.
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_reactNativeArchitectures: arm64-v8a,armeabi-v7a
        run: ./gradlew assembleRelease --build-cache --parallel -Dorg.gradle.jvmargs="-Xmx4g -XX:+HeapDumpOnOutOfMemoryError" -Dorg.gradle.workers.max=4

      - name: Get version info
        id: version
        working-directory: apps/mobile
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          DATE=$(date +'%Y%m%d-%H%M')
          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG_NAME="mobile-v${VERSION}-build.${DATE}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          APK_PATH=$(find apps/mobile/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK_PATH" "Calistenia-${{ steps.version.outputs.version }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: calistenia-apk
          path: Calistenia-${{ steps.version.outputs.version }}.apk
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: calistenia-apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag_name }}
          name: Calistenia ${{ needs.build.outputs.tag_name }}
          body: |
            ## Calistenia ${{ needs.build.outputs.version }}

            ${{ github.event.inputs.release_notes || 'Automated build' }}

            ### Instalar
            1. Descarga el archivo APK de abajo
            2. En tu Android, activa "Instalar apps de fuentes desconocidas" en Ajustes
            3. Abre el APK descargado para instalar

            ---
            Build desde el commit: ${{ github.sha }}
          files: Calistenia-${{ needs.build.outputs.version }}.apk
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
