name: Build & Deploy AI API

on:
  push:
    branches: [main]
    paths:
      - 'mcp-server/**'
      - '.github/workflows/build-ai-api.yml'
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - 'mcp-server/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-ai-api:
    name: Build & push AI API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta-ai
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ai-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push AI API image
        uses: docker/build-push-action@v7
        with:
          context: ./mcp-server
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ai.outputs.tags }}
          labels: ${{ steps.meta-ai.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy AI API
    runs-on: ubuntu-latest
    needs: [build-ai-api]
    if: github.event_name != 'pull_request'
    steps:
      - name: Trigger deploy
        run: |
          if [ -n "${{ secrets.DOKPLOY_AI_API_WEBHOOK_URL }}" ]; then
            curl -sSf -X POST "${{ secrets.DOKPLOY_AI_API_WEBHOOK_URL }}"
          fi
