name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # github.repository is "<owner>/<repo>", e.g. "guillermomarin/calistenia-app"
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx (multi-platform capable) ─────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Log in to GitHub Container Registry ────────────────────────────────
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Extract metadata (tags + labels) ──────────────────────────────────
      # Produces:
      #   push to main  → ghcr.io/<owner>/<repo>:main  + :sha-<short>
      #   push tag v1.2 → ghcr.io/<owner>/<repo>:1.2   + :latest + :sha-<short>
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      # ── 5. Build (and push on non-PR) ─────────────────────────────────────────
      # VITE_POCKETBASE_URL is passed as a build arg so the compiled JS bundle
      # points to the correct domain.  Set the VITE_POCKETBASE_URL secret in
      # your GitHub repo:  Settings → Secrets → Actions → New repository secret
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_POCKETBASE_URL=${{ secrets.VITE_POCKETBASE_URL }}
          # Layer caching via GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
