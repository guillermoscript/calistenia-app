# Local development / smoke-test of the production image
#
# Usage:
#   docker compose up --build
#   docker compose down -v
#
# App: http://localhost:8090
# PocketBase admin: http://localhost:8090/_/
# AI API: http://localhost:3001/api/health

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_AI_API_URL: http://localhost:3001
    container_name: calistenia-app
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data_local:/app/pb_data

  ai-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: calistenia-ai-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # At least one provider key is required
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # PocketBase URL (internal Docker network)
      - POCKETBASE_URL=http://app:8090
      # Optional: set preferred provider and model overrides
      - DEFAULT_AI_PROVIDER=${DEFAULT_AI_PROVIDER:-}
      - DEFAULT_MODEL_FREE=${DEFAULT_MODEL_FREE:-}
      - DEFAULT_MODEL_PRO=${DEFAULT_MODEL_PRO:-}
      # Optional: rate limit tuning
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-10}
    depends_on:
      - app
