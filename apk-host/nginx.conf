server {
    listen 80;
    server_name _;

    # Serve .apk so Android treats it as an installable package, not text.
    types {
        application/vnd.android.package-archive apk;
    }
    default_type application/octet-stream;

    # Allow large transfers without buffering surprises.
    sendfile on;
    client_max_body_size 0;

    # Baked landing page (big "Descargar" button + instructions).
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Stable "always newest" link — the one to bookmark on the phone.
    # Points at a symlink the CI step updates after every successful build.
    location = /latest.apk {
        alias /data/apks/latest.apk;
        add_header Content-Disposition 'attachment; filename="Calistenia-latest.apk"';
        add_header Cache-Control "no-store";
    }

    # Browsable archive of every published build.
    location /apks/ {
        alias /data/apks/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header Cache-Control "no-store";
    }
}
