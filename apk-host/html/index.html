<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Descargar Calistenia</title>
  <meta name="description" content="Descarga la última versión de la app Calistenia para Android." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0b0f;
      --card: #15151d;
      --line: #26263340;
      --fg: #f5f5f7;
      --muted: #9b9ba8;
      --accent: #c9ff3b;
      --accent-fg: #0b0b0f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(1200px 600px at 50% -10%, #1b1b27 0%, var(--bg) 60%);
      color: var(--fg);
      font-family: "DM Sans", system-ui, -apple-system, sans-serif;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 20px 60px #0008;
    }
    .logo {
      font-family: "Bebas Neue", sans-serif;
      font-size: 56px;
      letter-spacing: 2px;
      line-height: 1;
      margin: 0 0 4px;
    }
    .tag { color: var(--muted); font-size: 14px; margin: 0 0 28px; }
    .btn {
      display: block;
      width: 100%;
      background: var(--accent);
      color: var(--accent-fg);
      text-decoration: none;
      font-weight: 700;
      font-size: 18px;
      padding: 18px;
      border-radius: 14px;
      transition: transform .08s ease, filter .15s ease;
    }
    .btn:active { transform: scale(.98); }
    .btn:hover { filter: brightness(1.05); }
    .browse {
      display: inline-block;
      margin-top: 16px;
      color: var(--muted);
      font-size: 14px;
      text-decoration: none;
      border-bottom: 1px dashed var(--line);
    }
    .browse:hover { color: var(--fg); }
    .steps {
      text-align: left;
      margin: 28px 0 0;
      padding: 20px;
      background: #0e0e15;
      border: 1px solid var(--line);
      border-radius: 14px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }
    .steps b { color: var(--fg); font-weight: 500; }
    ol { margin: 8px 0 0; padding-left: 20px; }
    li { margin-bottom: 6px; }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="logo">CALISTENIA</h1>
    <p class="tag">App para Android · última versión</p>

    <a class="btn" href="/latest.apk">Descargar APK</a>
    <a class="browse" href="/apks/">Ver todas las versiones</a>

    <div class="steps">
      <b>Cómo instalar</b>
      <ol>
        <li>Toca <b>Descargar APK</b>.</li>
        <li>Abre el archivo descargado.</li>
        <li>Si Android lo pide, permite <b>«Instalar apps de fuentes desconocidas»</b>.</li>
        <li>Pulsa <b>Instalar</b>.</li>
      </ol>
    </div>
  </main>
</body>
</html>
